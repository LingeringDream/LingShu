name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Rust Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lingshu_test
          POSTGRES_USER: lingshu
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      - name: Install sqlx-cli
        # Pin to the 0.8.x line: it matches the `sqlx = "0.8"` dependency and stays
        # compatible with the repo's pinned rustc (1.88). sqlx-cli 0.9+ requires rustc 1.94+.
        run: cargo install sqlx-cli --version '^0.8' --locked --no-default-features --features postgres
      - name: Run migrations
        run: sqlx migrate run --source crates/lingshu-server/migrations
        env:
          DATABASE_URL: postgres://lingshu:test_password@localhost:5432/lingshu_test
      - name: Run tests
        run: cargo test --all
        env:
          DATABASE_URL: postgres://lingshu:test_password@localhost:5432/lingshu_test
          REDIS_URL: redis://localhost:6379

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
        continue-on-error: true
      - run: npm run type-check
      - run: npm run build

  openapi-contract:
    name: OpenAPI Contract
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      - name: Generate OpenAPI spec
        run: cargo test generate_openapi -- --ignored 2>/dev/null || echo "OpenAPI generation test not yet implemented"
      - name: Verify OpenAPI spec committed
        run: |
          if [ -f docs/api/openapi.json ]; then
            echo "OpenAPI spec exists"
          else
            echo "OpenAPI spec not generated yet (expected in Phase 1)"
          fi
