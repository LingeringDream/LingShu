services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: lingshu
      POSTGRES_USER: lingshu
      POSTGRES_PASSWORD: lingshu
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lingshu"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        - CMD
        - bash
        - -lc
        - >-
          exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /healthz HTTP/1.1\r\nHost: 127.0.0.1\r\n\r\n' >&3 && head -n 1 <&3 | grep -q '200'
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: crates/lingshu-server/Dockerfile.dev
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ../crates:/app/crates
      - cargo_cache:/usr/local/cargo/registry
    environment:
      DATABASE_URL: postgres://lingshu:lingshu@postgres:5432/lingshu
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://host.docker.internal:11434
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      JWT_SECRET: dev-jwt-secret-change-me
      ENCRYPTION_KEY: dev-encryption-key-change-me
      RUST_LOG: info,lingshu_server=debug
      SQLX_OFFLINE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/system/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    profiles: ["full"]
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://backend:8080
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:5173/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  qdrant_data:
  cargo_cache:
  frontend_node_modules:
