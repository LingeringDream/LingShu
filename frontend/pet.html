<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵枢 — 桌面宠物</title>
    <style>
      /* Pet window: frameless, transparent background handled by Tauri */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        -webkit-app-region: drag;
      }
      /* The React root and its children default to no-drag */
      #root {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-app-region: no-drag;
      }
      /* Allow drag on a dedicated drag handle */
      [data-tauri-drag-region] {
        -webkit-app-region: drag;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/pet.tsx"></script>
  </body>
</html>
